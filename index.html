<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Expense Tracker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Header Section -->
        <header class="header">
            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <h1>Expense Tracker</h1>
            </div>
            <button id="theme-toggle" class="btn-theme" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <!-- Summary Cards Section -->
        <section class="summary-cards">
            <div class="card balance-card">
                <h3>Total Balance</h3>
                <h2 id="total-balance">$0.00</h2>
            </div>
            <div class="card income-card">
                <h3><i class="fa-solid fa-arrow-trend-up"></i> Income</h3>
                <h2 id="total-income">+$0.00</h2>
            </div>
            <div class="card expense-card">
                <h3><i class="fa-solid fa-arrow-trend-down"></i> Expense</h3>
                <h2 id="total-expense">-$0.00</h2>
            </div>
        </section>

        <!-- Main Content Grid -->
        <main class="main-grid">
            <!-- Left Column: Form and Filters -->
            <div class="left-col">
                <section class="card form-section">
                    <h2>Add Transaction</h2>
                    <form id="transaction-form">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" placeholder="e.g. Salary, Groceries" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" placeholder="e.g. 500" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="type">Type</label>
                            <select id="type" required>
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="housing">Housing</option>
                                <option value="food">Food</option>
                                <option value="transportation">Transportation</option>
                                <option value="utilities">Utilities</option>
                                <option value="entertainment">Entertainment</option>
                                <option value="salary" class="income-option">Salary</option>
                                <option value="freelance" class="income-option">Freelance</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <button type="submit" class="btn-primary">Add Transaction</button>
                    </form>
                </section>
                
                <section class="card filter-section">
                    <h2>Filter Transactions</h2>
                    <div class="filters">
                        <select id="filter-type">
                            <option value="all">All Types</option>
                            <option value="income">Income Only</option>
                            <option value="expense">Expense Only</option>
                        </select>
                        <input type="month" id="filter-month">
                    </div>
                </section>
            </div>

            <!-- Right Column: Chart and List -->
            <div class="right-col">
                <section class="card chart-section">
                    <h2>Expenses by Category</h2>
                    <div class="chart-container">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </section>

                <section class="card list-section">
                    <h2>Recent Transactions</h2>
                    <div class="list-container">
                        <ul id="transaction-list" class="transaction-list">
                            <!-- Transactions dynamically added here -->
                        </ul>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
